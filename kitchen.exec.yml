---
driver:
  name: exec

transport:
  name: exec

provisioner:
  name: chef_infra
  product_name: chef
  install_strategy: skip
  chef_omnibus_install: false
  chef_client_path: chef-client
  chef_license: accept
  deprecations_as_errors: true
  enforce_idempotency: true
  multiple_converge: 2

verifier:
  name: shell
  remote_exec: true
  command: |
    $ErrorActionPreference = 'Stop'

    $listeners = (& winrm enumerate winrm/config/listener) -join "`n"
    if ($listeners -notmatch '(?m)^\s*Transport\s*=\s*HTTP\s*$') {
      throw 'WinRM HTTP listener was not configured.'
    }
    if ($listeners -notmatch '(?m)^\s*Transport\s*=\s*HTTPS\s*$') {
      throw 'WinRM HTTPS listener was not configured.'
    }

    $httpRule = Get-NetFirewallRule -DisplayName 'WINRM HTTP Static Port'
    $httpsRule = Get-NetFirewallRule -DisplayName 'WINRM HTTPS Static Port'
    if ($httpRule.Enabled -ne 'True' -or $httpRule.Action -ne 'Allow') {
      throw 'WINRM HTTP Static Port firewall rule is not enabled and allowed.'
    }
    if ($httpsRule.Enabled -ne 'True' -or $httpsRule.Action -ne 'Allow') {
      throw 'WINRM HTTPS Static Port firewall rule is not enabled and allowed.'
    }

    $httpPort = $httpRule | Get-NetFirewallPortFilter
    $httpsPort = $httpsRule | Get-NetFirewallPortFilter
    if ($httpPort.Protocol -ne 'TCP' -or $httpPort.LocalPort -ne '5985') {
      throw 'WINRM HTTP Static Port firewall rule does not allow TCP/5985.'
    }
    if ($httpsPort.Protocol -ne 'TCP' -or $httpsPort.LocalPort -ne '5986') {
      throw 'WINRM HTTPS Static Port firewall rule does not allow TCP/5986.'
    }

platforms:
  - name: windows-latest
